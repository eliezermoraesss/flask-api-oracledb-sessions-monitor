<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Histórico de Sessões Eliminadas</title>
  <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='M.ico') }}?v=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .log-window {
      background-color: #0d1117;
      color: #c9d1d9;
      font-family: Consolas, Monaco, monospace;
      font-size: 0.95rem;
      padding: 15px;
      border-radius: 8px;
      height: 70vh;
      overflow-y: scroll;
      white-space: pre-wrap;
    }
  </style>
</head>
<body class="bg-light">
  <div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3>🗑 Sessões Eliminadas de Hoje</h3>
      <a href="https://cloud.multfer.com.br/session" class="btn btn-secondary">⬅ Voltar</a>
    </div>
    <div class="log-window">
      {% if log_content %}
        {{ log_content }}
      {% else %}
        Nenhuma sessão eliminada hoje.
      {% endif %}
    </div>
  </div>
</body>
</html>
